apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: wiremock-uix
  namespace: wiremock-dashboard
  labels:
    app.kubernetes.io/name: wiremock-uix
    app.kubernetes.io/part-of: wiremock-dashboard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: wiremock-uix
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
