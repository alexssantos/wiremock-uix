name: Publish Docker image

# Builds and pushes alexssantos/wiremock-uix to Docker Hub whenever a version
# tag (vX.Y.Z) is pushed, or on demand via workflow_dispatch. Each run pushes
# two tags: the exact version and `latest`.
#
# Required repository secrets (Settings > Secrets and variables > Actions):
#   DOCKERHUB_USERNAME - Docker Hub username (alexssantos)
#   DOCKERHUB_TOKEN     - Docker Hub access token (Account Settings > Security
#                          > Personal access tokens). Use a non-expiring or
#                          long-lived token with Read & Write scope; rotate it
#                          by updating this secret if it's ever revoked.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.1.0), without a leading v"
        required: true

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            alexssantos/wiremock-uix:latest
            alexssantos/wiremock-uix:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Published image" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`alexssantos/wiremock-uix:${{ steps.version.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`alexssantos/wiremock-uix:latest\`" >> "$GITHUB_STEP_SUMMARY"
