server {
    listen 8081;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Never cache index.html or the runtime config script, so deployments and
    # WIREMOCK_BASE_URL changes are picked up immediately on next page load.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location = /config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Fingerprinted build assets can be cached aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Client-side routing (React Router): fall back to index.html for any
    # non-file request.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
