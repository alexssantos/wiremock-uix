services:
  wiremock:
    image: wiremock/wiremock:3.9.1
    container_name: wiremock
    ports:
      - "8090:8080"
    command: ["--global-response-templating", "--verbose"]
    volumes:
      # WireMock auto-loads every *.json file in this directory as a stub
      # mapping on startup, seeding 30 example stubs (Users, Products, Orders
      # sample APIs — see examples/sample-stub-mappings.json). Mounted
      # read-only so edits made through the dashboard are kept in the
      # container's own filesystem, not written back to the repo.
      - ./docker/wiremock-seed/mappings:/home/wiremock/mappings:ro

  wiremock-ui:
    image: alexssantos/wiremock-uix:latest
    # Uncomment to build locally instead of pulling from Docker Hub:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    container_name: wiremock-ui
    ports:
      - "8091:8081"
    environment:
      # NOTE: this dashboard is a browser-side SPA, so WIREMOCK_BASE_URL must
      # be reachable from the user's browser (not just from inside the Docker
      # network) — use the host-published address, not the service name.
      WIREMOCK_BASE_URL: http://localhost:8090
    depends_on:
      - wiremock
